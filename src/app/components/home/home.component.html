<div class="flex-1 overflow-y-auto overflow-x-hidden p-4 md:p-8 bg-sagrada-bg w-full relative">
    <div class="max-w-7xl mx-auto space-y-8">

        <!-- Bienvenida -->
        <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Pipeline Overview</h1>
                <p class="text-slate-500 mt-1">Aquí tienes un resumen actualizado de tu negocio hoy.</p>
            </div>
            <button (click)="abrirModal()"
                class="bg-sagrada-gold hover:bg-sagrada-gold-hover text-white px-5 py-2.5 rounded-xl shadow-sm text-sm font-semibold transition-all transform hover:-translate-y-0.5 whitespace-nowrap">
                + Nuevo Trato
            </button>
        </div>

        <!-- Tarjetas de KPIs (Cargando desde el Observable) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div *ngFor="let kpi of kpis"
                class="bg-sagrada-paper p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow group">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-slate-500 text-sm font-semibold">{{ kpi.titulo }}</h3>
                    <div
                        class="p-2.5 bg-sagrada-purple/10 text-sagrada-purple rounded-lg group-hover:bg-sagrada-gold group-hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                        </svg>
                    </div>
                </div>
                <p class="text-3xl font-bold text-slate-800">{{ kpi.valor }}</p>
                <p class="text-sm mt-3 flex items-center font-medium"
                    [ngClass]="kpi.tendencia > 0 ? 'text-emerald-500' : 'text-red-500'">
                    <span>{{ kpi.tendencia > 0 ? '+' : '' }}{{ kpi.tendencia }}%</span>
                    <span class="text-slate-400 ml-2 font-normal">vs mes anterior</span>
                </p>
            </div>
        </div>

        <div *ngIf="mostrarModal"
            class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">

            <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl transform transition-all">

                <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="text-xl font-bold text-slate-800 tracking-tight">🚀 Nuevo Trato</h3>
                    <button (click)="cerrarModal()" class="text-slate-400 hover:text-red-500 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div class="p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nombre del Trato</label>
                        <input type="text" placeholder="Ej: Venta Software I.A."
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sagrada-purple outline-none transition-all">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Valor ($)</label>
                            <input type="number" placeholder="0.00"
                                class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sagrada-purple outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Etapa</label>
                            <select
                                class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-sagrada-purple outline-none bg-white">
                                <option>Prospección</option>
                                <option>Cualificado</option>
                                <option>Propuesta</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="p-6 bg-slate-50 rounded-b-2xl flex gap-3 justify-end">
                    <button (click)="cerrarModal()"
                        class="px-5 py-2.5 rounded-xl text-sm font-bold text-slate-600 hover:bg-slate-200 transition-all">Cancelar</button>
                    <button
                        class="bg-sagrada-purple text-white px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-purple-200 hover:bg-sagrada-purple-dark transition-all transform hover:-translate-y-0.5">Guardar
                        Trato</button>
                </div>
            </div>
        </div>
        <!-- Interfaz ClienteList y Kanban (Para MVP mostramos ambos en el Dashboard Central) -->
        <app-cliente-list></app-cliente-list>

        <app-kanban-board></app-kanban-board>

    </div>
</div>
